name: Upload a new image to docker

description: Builds and uploads a new Docker image to the configured registry.

branding:
  icon: package
  color: blue

inputs:
  docker_username:
    description: Docker Hub username used to authenticate and push the image.
    required: true
  docker_token:
    description: Docker Hub access token used for secure authentication.
    required: true
  docker_tags: 
    description: Comma-separated image tags to apply when pushing, for example latest,v1.2.0.
    required: true
  docker_platforms:
    description: Target build platforms, for example linux/amd64,linux/arm64.
    required: true
  docker_file:
    description: Path to the Dockerfile to use for building the image, relative to repository root (e.g., Dockerfile or ./bot/Dockerfile).
    required: true


runs:
  using: composite
  steps:

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container
        use: true

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_token }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ inputs.docker_file }}
        push: true
        tags: ${{ inputs.docker_tags }}
        platforms: ${{ inputs.docker_platforms }}